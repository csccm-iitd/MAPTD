# environment
task: structure-Skyscraper_rom
action_repeat: 4
discount: 0.99
episode_length: 200/${action_repeat}
train_steps: 100000/${action_repeat}
lb: -25000
ub: 25000

# planning
iterations: 6
num_samples: 256
num_elites: 64
mixture_coef: 0.1
min_std: 0.05
temperature: 0.5
momentum: 0.1

# learning
batch_size: 256
max_buffer_size: 1000000
horizon: 5
reward_coef: 0.5
value_coef: 0.5
model_coef: 1
rho: 0.5
lr: 1e-3
std_schedule: linear(0.5, ${min_std}, 25000)
horizon_schedule: linear(1, ${horizon}, 25000)
per_alpha: 0.6
per_beta: 0.4
grad_clip_norm: 30
seed_steps: 100
update_freq: 1
tau: 0.01

# architecture
mlp_dim: [512,512,384,256,128]
model_mlp: [512,384,512,512,384,512]

# wandb (insert your own)
use_wandb: false
wandb_project: none
wandb_entity: none

# misc
seed: 1
exp_name: online
eval_freq: 4000
eval_episodes: 10
deviceid: 0
save_video: false
save_model: True
