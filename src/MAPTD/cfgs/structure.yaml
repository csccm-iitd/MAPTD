# environment
task: structure-Skyscraper
action_repeat: 4
discount: 0.99
episode_length: 400/${action_repeat}
train_steps: 150000/${action_repeat}
lb: -2500
ub: 2500

# planning
iterations: 6
num_samples: 128
num_elites: 64
mixture_coef: 0.2
min_std: 0.05
temperature: 0.5
momentum: 0.1

# learning
batch_size: 128
max_buffer_size: 1000000
horizon: 5
value_coef: 1
rho: 0.5
kappa: 0.1
lr: 1e-3
std_schedule: linear(0.5, ${min_std}, 25000)
horizon_schedule: linear(1, ${horizon}, 25000)
per_alpha: 0.6
per_beta: 0.4
grad_clip_norm: 20
seed_steps: 100
update_freq: 1
tau: 0.01

# architecture
enc_dim: 256
mlp_dim: [256,384,128,64]
latent_dim: 256

# wandb (insert your own)
use_wandb: false
wandb_project: none
wandb_entity: none

# misc
seed: 1
exp_name: default
eval_freq: 4000
eval_episodes: 10
deviceid: 0
save_video: false
save_model: True
